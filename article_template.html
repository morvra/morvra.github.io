<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="{{DESCRIPTION}}">

    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    <link rel="stylesheet" href="/styles.css">
    <link href='/bullet_icon.png' rel='icon' type='image/x-icon'/>
    <link href='/bullet_icon.png' rel='shortcut icon'/>
    <link href='/bullet_icon.png' rel='apple-touch-icon'/>
    <link rel="stylesheet" type="text/css" href="//netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3575252598876356" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-3575252598876356">
</head>
<body>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0G0NP5Z9M9"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0G0NP5Z9M9');
    </script>

    <div id="header"></div>

    <main>
        <div id="article">
            <div id="article-title"><h1>{{TITLE}}</h1></div>
            <div id="article-date">{{DATE}}</div>
            <div id="article-tags">{{TAGS}}</div>

            <div id="article-content">
                {{BODY}}
            </div>

            <div id="ad">
                スポンサードリンク
                <script async src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-3575252598876356"
                     data-ad-slot="6223968026"
                     data-ad-format="rectangle"></ins>
                <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            {{RELATED}}
        </div>
    </main>

    <div id="footer"></div>

    <script>
        fetch("/header.html").then(r => r.text()).then(d => document.querySelector("#header").innerHTML = d);
        fetch("/footer.html").then(r => r.text()).then(d => document.querySelector("#footer").innerHTML = d);
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.footnote-ref a').forEach(el => {
                // title属性をdata-fnに退避してブラウザ標準ツールチップを消す
                el.dataset.fn = el.getAttribute('title');
                el.removeAttribute('title');

                const showTip = () => {
                    if (el.parentNode.querySelector('.fn-tooltip')) return;
                    const tip = document.createElement('span');
                    tip.className = 'fn-tooltip';
                    tip.textContent = el.dataset.fn;
                    el.parentNode.appendChild(tip);
                };

                const hideTip = () => {
                    el.parentNode.querySelectorAll('.fn-tooltip').forEach(t => t.remove());
                };

                // ホバー
                el.addEventListener('mouseenter', showTip);
                el.addEventListener('mouseleave', hideTip);

                // タップ: 1回目でツールチップ、2回目で移動
                el.addEventListener('click', function (e) {
                    const existing = el.parentNode.querySelector('.fn-tooltip');
                    if (existing) return; // 2回目 → そのままhref先へ移動
                    e.preventDefault();
                    showTip();
                    const close = (ev) => {
                        if (ev.target !== el) {
                            hideTip();
                            document.removeEventListener('click', close);
                        }
                    };
                    setTimeout(() => document.addEventListener('click', close), 0);
                });
            });
        });
    </script>
</body>
</html>
