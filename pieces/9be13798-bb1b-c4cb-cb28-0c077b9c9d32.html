    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.footnote-ref a').forEach(el => {
                el.addEventListener('click', function (e) {
                    // すでにツールチップが出ていれば2回目タップ → 移動させる
                    const existing = el.parentNode.querySelector('.fn-tooltip');
                    if (existing) return; // そのままhref先へ移動

                    // 1回目タップ → ツールチップを表示して移動キャンセル
                    e.preventDefault();

                    // 他のツールチップを消す
                    document.querySelectorAll('.fn-tooltip').forEach(t => t.remove());

                    const tip = document.createElement('span');
                    tip.className = 'fn-tooltip';
                    tip.textContent = el.getAttribute('title');
                    el.parentNode.appendChild(tip);

                    // 画面外クリックで閉じる
                    const close = (ev) => {
                        if (!tip.contains(ev.target) && ev.target !== el) {
                            tip.remove();
                            document.removeEventListener('click', close);
                        }
                    };
                    setTimeout(() => document.addEventListener('click', close), 0);
                });
            });
        });
    </script>
