// PNG EXPORT
// ═══════════════════════════════════════════════════
async function exportPNG(){
  // Compute bounding box in board coords
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  const MARGIN=40;
  state.nodes.forEach(n=>{
    const el=document.getElementById(n.id);
    const w=el?el.offsetWidth:(n.width||220), h=el?el.offsetHeight:(n.height||80);
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+w); maxY=Math.max(maxY,n.y+h);
  });
  state.groups.forEach(g=>{
    minX=Math.min(minX,g.x); minY=Math.min(minY,g.y);
    maxX=Math.max(maxX,g.x+g.width); maxY=Math.max(maxY,g.y+g.height);
  });
  state.arrows.forEach(a=>{
    minX=Math.min(minX,a.x1,a.x2); minY=Math.min(minY,a.y1,a.y2);
    maxX=Math.max(maxX,a.x1,a.x2); maxY=Math.max(maxY,a.y1,a.y2);
  });
  state.texts.forEach(t=>{
    const el=document.getElementById(t.id);
    const w=el?el.offsetWidth:120, h=el?el.offsetHeight:30;
    minX=Math.min(minX,t.x); minY=Math.min(minY,t.y);
    maxX=Math.max(maxX,t.x+w); maxY=Math.max(maxY,t.y+h);
  });
  if(!isFinite(minX)){showToast('書き出す要素がありません');return;}
  minX-=MARGIN; minY-=MARGIN; maxX+=MARGIN; maxY+=MARGIN;
  const cw=maxX-minX, ch=maxY-minY;

  const cs=getComputedStyle(document.documentElement);
  const bgColor=cs.getPropertyValue('--bg').trim()||'#19171a';
  const connColor=cs.getPropertyValue('--conn-color').trim()||'#c8a96e';
  const uiBg=cs.getPropertyValue('--ui-bg').trim()||bgColor;

  // ── Save state and set up a clean 1:1 view ──────────────
  deselectAll();
  const prevScale=state.scale, prevOX=state.offsetX, prevOY=state.offsetY;
  state.scale=1; state.offsetX=-minX; state.offsetY=-minY;
  updateTransform();

  // Hide UI chrome
  const hideEls=['toolbar','sidebar','hint','hint-toggle','label-editor','arrow-label-editor','settings-panel'];
  hideEls.forEach(id=>{const e=document.getElementById(id);if(e)e.style.visibility='hidden'});
  document.querySelectorAll('.card-actions,.resizer,.arrow-handle,.ft-resize-box').forEach(e=>e.style.visibility='hidden');

  // KEY FIX: expand container so overflow:hidden doesn't clip distant elements
  const prevOverflow=container.style.overflow;
  const prevW=container.style.width, prevH=container.style.height;
  container.style.overflow='visible';
  container.style.width=cw+'px';
  container.style.height=ch+'px';

  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

  try{
    const DPR=Math.min(window.devicePixelRatio||1, 2);

    // ── 1. Capture DOM via html2canvas on container ──
    const domCanvas = typeof html2canvas !== 'undefined'
      ? await html2canvas(container, {
          x: 0, y: 0,
          width: cw, height: ch,
          backgroundColor: bgColor,
          scale: DPR,
          useCORS: true,
          logging: false,
          imageTimeout: 0,
          ignoreElements: el => el.id==='conn-svg',
        })
      : null;

    // ── 2. Build output canvas ──────────────────────────────────
    const out=document.createElement('canvas');
    out.width=Math.round(cw*DPR); out.height=Math.round(ch*DPR);
    const ctx=out.getContext('2d');
    // Enable crisp rendering
    ctx.imageSmoothingEnabled=false;
    if(domCanvas) ctx.drawImage(domCanvas,0,0);
    else{ ctx.fillStyle=bgColor; ctx.fillRect(0,0,out.width,out.height); }

    // ── 3. Draw SVG (connections + arrows) on top ───────────────
    const svgEl=document.getElementById('conn-svg');
    const svgClone=svgEl.cloneNode(true);
    svgClone.querySelectorAll('.arrow-handle,.conn-hitbox,.arrow-hitbox').forEach(e=>e.remove());
    svgClone.setAttribute('width',cw*DPR);
    svgClone.setAttribute('height',ch*DPR);
    svgClone.setAttribute('viewBox',`${minX} ${minY} ${cw} ${ch}`);
    // Inline CSS vars so SVG renders correctly as image
    svgClone.querySelectorAll('.conn-path,.arrow-line').forEach(el=>{
      el.style.stroke=connColor;
      el.style.strokeWidth='1.5';
    });
    svgClone.querySelectorAll('.conn-label-text,.arrow-label-text').forEach(el=>{
      el.style.fill=connColor;
      el.style.fontFamily='Outfit,sans-serif';
      el.style.fontSize='11px';
    });
    svgClone.querySelectorAll('rect[class]').forEach(el=>{
      if((el.className.baseVal||'').match(/label/)){
        el.style.fill=uiBg; el.style.stroke=connColor;
      }
    });
    svgClone.querySelectorAll('polygon').forEach(el=>el.setAttribute('fill',connColor));
    const svgStr=new XMLSerializer().serializeToString(svgClone);
    const svgUrl=URL.createObjectURL(new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'}));
    await new Promise((res,rej)=>{
      const img=new Image();
      img.onload=()=>{
        ctx.imageSmoothingEnabled=true;
        ctx.drawImage(img,0,0);
        URL.revokeObjectURL(svgUrl); res();
      };
      img.onerror=e=>{URL.revokeObjectURL(svgUrl);rej(e);};
      img.src=svgUrl;
    });

    const link=document.createElement('a');
    link.download='boardflowy.png';
    link.href=out.toDataURL('image/png');
    link.click();
    showToast('PNG書き出し完了');
  } catch(err){
    showToast('書き出しに失敗しました: '+err.message);
    console.error(err);
  } finally {
    container.style.overflow=prevOverflow||'';
    container.style.width=prevW||'';
    container.style.height=prevH||'';
    state.scale=prevScale; state.offsetX=prevOX; state.offsetY=prevOY;
    updateTransform();
    hideEls.forEach(id=>{const e=document.getElementById(id);if(e)e.style.visibility=''});
    document.querySelectorAll('.card-actions,.resizer,.arrow-handle,.ft-resize-box').forEach(e=>e.style.visibility='');
  }
}

// ═══════════════════════════════════════════════════
// MULTI-BOARD
// ═══════════════════════════════════════════════════
const BOARDS_KEY='flowboard_boards';
const CURRENT_KEY='flowboard_current';

function getBoards(){
  try{return JSON.parse(localStorage.getItem(BOARDS_KEY)||'[]')}catch{return []}
}
function saveBoards(boards){localStorage.setItem(BOARDS_KEY,JSON.stringify(boards))}
function getCurrentBoardId(){return localStorage.getItem(CURRENT_KEY)||null}
function setCurrentBoardId(id){localStorage.setItem(CURRENT_KEY,id)}

function initBoards(){
  let boards=getBoards();
  // Migrate: if old single-board data exists but no boards list, create board entry
  if(!boards.length){
    const id='b_default';
    boards=[{id,name:'ボード 1'}];
    saveBoards(boards);
    setCurrentBoardId(id);
    // Migrate existing data from STORAGE_KEY to per-board key
    const oldData=localStorage.getItem(STORAGE_KEY);
    if(oldData) localStorage.setItem('flowboard_state_'+id, oldData);
  }
  // Ensure current board is in the list
  let curId=getCurrentBoardId();
  if(!curId||!boards.find(b=>b.id===curId)){
    curId=boards[0].id;
    setCurrentBoardId(curId);
  }
  state.boardId=curId;
  state.boardName=boards.find(b=>b.id===curId)?.name||'ボード 1';
}

function saveBoardState(){
  if(!state.boardId) return;
  const key='flowboard_state_'+state.boardId;
  localStorage.setItem(key, JSON.stringify(state));
  // 更新順を記録
  const boards=getBoards();
  const b=boards.find(x=>x.id===state.boardId);
  if(b){b.updatedAt=Date.now();saveBoards(boards);}
}

function loadBoardState(id){
  const key='flowboard_state_'+id;
  try{
    const saved=JSON.parse(localStorage.getItem(key)||'null');
    if(saved){
      // Clear existing DOM
      board.innerHTML=''; board.appendChild(connSvg);
      Object.assign(state, {
        offsetX:0,offsetY:0,scale:1,
        nodes:[],groups:[],connections:[],arrows:[],texts:[],maxZ:1000,
        ...saved, boardId:id
      });
      state.arrows=state.arrows||[];
      state.texts=state.texts||[];
    } else {
      board.innerHTML=''; board.appendChild(connSvg);
      state={offsetX:0,offsetY:0,scale:1,nodes:[],groups:[],connections:[],arrows:[],texts:[],maxZ:1000,boardId:id,boardName:getBoardName(id)};
    }
    state.boardId=id;
    state.boardName=getBoardName(id);
    setCurrentBoardId(id);
    updateTitle();
    state.groups.forEach(renderGroup);
    state.nodes.forEach(renderCard);
    state.texts.forEach(renderFreeText);
    renderAllConnections(); renderAllArrows();
    updateTransform(); updateCounter(); renderSidebar();
  } catch(e){console.error(e)}
}

function getBoardName(id){
  return getBoards().find(b=>b.id===id)?.name||'ボード';
}

function updateTitle(){
  document.title=(state.boardName||'ボード')+' - Boardflowy';
}

function toggleBoardManager(){
  const el=document.getElementById('board-manager');
  el.classList.toggle('open');
  if(el.classList.contains('open')) renderBoardManager();
}

function renderBoardManager(){
  const el=document.getElementById('board-manager');
  const boards=getBoards().slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  el.innerHTML='';
  boards.forEach(b=>{
    const row=document.createElement('div');
    row.className='board-item'+(b.id===state.boardId?' active':'');
    const nameEl=document.createElement('div');
    nameEl.className='board-item-name';
    nameEl.contentEditable='false';
    nameEl.textContent=b.name;
    nameEl.ondblclick=e=>{e.stopPropagation();nameEl.contentEditable='true';nameEl.focus();document.execCommand('selectAll',false,null)};
    nameEl.onblur=()=>{
      nameEl.contentEditable='false';
      const boards2=getBoards();
      const idx=boards2.findIndex(x=>x.id===b.id);
      if(idx!==-1){boards2[idx].name=nameEl.textContent.trim()||b.name;saveBoards(boards2);}
      if(b.id===state.boardId){state.boardName=nameEl.textContent.trim()||b.name;updateTitle();}
      renderBoardManager();
    };
    nameEl.onkeydown=e=>{if(e.key==='Enter'||e.key==='Escape'){e.preventDefault();nameEl.blur()}};

    const actions=document.createElement('div'); actions.className='board-item-actions';
    const delBtn=document.createElement('div'); delBtn.className='board-item-btn';
    delBtn.innerHTML='<svg width="10" height="10" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 2l10 10M12 2L2 12"/></svg>';
    delBtn.onclick=e=>{
      e.stopPropagation();
      const bs=getBoards();
      if(bs.length<=1){showToast('最後のボードは削除できません');return}
      if(!confirm(`「${b.name}」を削除しますか？`))return;
      const newBs=bs.filter(x=>x.id!==b.id);
      saveBoards(newBs);
      localStorage.removeItem('flowboard_state_'+b.id);
      if(state.boardId===b.id) loadBoardState(newBs[0].id);
      else renderBoardManager();
    };
    actions.appendChild(delBtn);
    row.append(nameEl,actions);
    if(b.id!==state.boardId) row.onclick=()=>{saveBoardState();loadBoardState(b.id);renderBoardManager()};
    el.appendChild(row);
  });
  const addBtn=document.createElement('div'); addBtn.className='board-add-btn';
  addBtn.textContent='＋ 新規ボード';
  addBtn.onclick=()=>{
    const id='b'+Date.now();
    const boards2=getBoards();
    boards2.push({id,name:'ボード '+(boards2.length+1)});
    saveBoards(boards2); saveBoardState(); loadBoardState(id); renderBoardManager();
  };
  el.appendChild(addBtn);

  // Full reset button
  const resetBtn=document.createElement('div');
  resetBtn.style.cssText='margin-top:8px;padding:5px;border-radius:6px;cursor:pointer;font-size:.65rem;font-family:Outfit,sans-serif;color:var(--red);text-align:center;border:1px dashed rgba(212,88,74,0.4);transition:all .12s;';
  resetBtn.textContent='⚠ 全データ初期化';
  resetBtn.onmouseover=()=>resetBtn.style.background='rgba(212,88,74,0.1)';
  resetBtn.onmouseout=()=>resetBtn.style.background='';
  resetBtn.onclick=()=>{
    if(!confirm('すべてのボードとデータを完全に削除します。この操作は取り消せません。続けますか？')) return;
    // Clear all flowboard keys
    Object.keys(localStorage).filter(k=>k.startsWith('flowboard')).forEach(k=>localStorage.removeItem(k));
    location.reload();
  };
  el.appendChild(resetBtn);
}

// Override saveState to use per-board storage
function saveState(){
  history.push(JSON.stringify(state));
  if(history.length>40)history.shift();
  saveBoardState();
}

// ═══════════════════════════════════════════════════
// GROUP OPML EXPORT
// ═══════════════════════════════════════════════════
function copyGroupOPML(gid){
  const group=state.groups.find(g=>g.id===gid);
  if(!group) return;
  const cards=state.nodes.filter(n=>n.groupId===gid);
  let xml=`<?xml version="1.0" encoding="UTF-8"?><opml version="2.0"><head/><body>\n`;
  xml+=`  <outline text="${escXml(group.title||'グループ')}">\n`;
  cards.forEach(c=>{
    xml+=`    <outline text="${escXml(c.title||c.body||'')}">\n`;
    if(c.body&&c.title){
      c.body.split('\n').forEach(line=>{
        if(line.trim()) xml+=`      <outline text="${escXml(line)}"/>\n`;
      });
    }
    xml+=`    </outline>\n`;
  });
  xml+=`  </outline>\n</body></opml>`;
  navigator.clipboard.writeText(xml).then(()=>showToast('グループOPMLをコピーしました'));
}
function escXml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
// ═══════════════════════════════════════════════════
// RERENDER ALL
// ═══════════════════════════════════════════════════
function rerender(){
  board.innerHTML=''; board.appendChild(connSvg);
  state.groups.forEach(renderGroup);
  state.nodes.forEach(renderCardOrImage);
  state.texts.forEach(renderFreeText);
  renderAllConnections(); renderAllArrows(); updateCounter();
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer=null;
function showToast(msg){
  const old=document.querySelector('.toast'); if(old)old.remove();
  if(toastTimer)clearTimeout(toastTimer);
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(),2200);
}

const FONT_SIZES=[
  {label:'XS', card:'.65rem', body:'.62rem', conn:'9px',  group:'.68rem'},
  {label:'S',  card:'.70rem', body:'.66rem', conn:'10px', group:'.73rem'},
  {label:'M',  card:'.76rem', body:'.70rem', conn:'11px', group:'.80rem'},
  {label:'L',  card:'.84rem', body:'.78rem', conn:'13px', group:'.88rem'},
  {label:'XL', card:'.94rem', body:'.87rem', conn:'15px', group:'.96rem'},
];
let fontSizeIdx=2; // default M

function applyFontSize(idx){
  fontSizeIdx=idx;
  const fs=FONT_SIZES[idx];
  document.documentElement.style.setProperty('--fs-card', fs.card);
  document.documentElement.style.setProperty('--fs-body', fs.body);
  document.documentElement.style.setProperty('--fs-conn', fs.conn);
  document.documentElement.style.setProperty('--fs-group', fs.group);
  document.getElementById('font-size-val').textContent=fs.label;
  localStorage.setItem('flowboard_fontsize', idx);
}

function changeFontSize(d){
  applyFontSize(Math.max(0, Math.min(FONT_SIZES.length-1, fontSizeIdx+d)));
}

function toggleToolbar(){
  const tb=document.getElementById('toolbar');
  tb.classList.toggle('collapsed');
}

// ── TOOLBAR TOOLTIP ──────────────────────────────────
(function(){
  const tip=document.createElement('div');
  tip.id='tb-tooltip';
  document.body.appendChild(tip);
  let showTimer=null, hideTimer=null;

  function showTip(el){
    const text=el.getAttribute('data-tip');
    if(!text) return;
    clearTimeout(hideTimer);
    tip.textContent=text;
    tip.style.opacity='0';
    tip.style.display='block';
    const r=el.getBoundingClientRect();
    const tw=tip.offsetWidth;
    let left=r.left+r.width/2-tw/2;
    // clamp to viewport
    left=Math.max(8, Math.min(left, window.innerWidth-tw-8));
    tip.style.left=left+'px';
    tip.style.top=(r.top-tip.offsetHeight-8)+'px';
    clearTimeout(showTimer);
    showTimer=setTimeout(()=>{ tip.style.opacity='1' }, 80);
  }

  function hideTip(){
    clearTimeout(showTimer);
    hideTimer=setTimeout(()=>{ tip.style.opacity='0' }, 60);
  }

  document.getElementById('toolbar').addEventListener('mouseover', e=>{
    const el=e.target.closest('[data-tip]');
    if(el) showTip(el);
    else hideTip();
  });
  document.getElementById('toolbar').addEventListener('mouseout', e=>{
    const el=e.target.closest('[data-tip]');
    if(el) hideTip();
  });
})();

function toggleSettings(){
  const p=document.getElementById('settings-panel');
  const isOpen=p.classList.toggle('open');
  document.getElementById('settings-btn').classList.toggle('active', isOpen);
  if(isOpen) updateSettingsUI();
}

function updateSettingsUI(){
  const isLight=document.documentElement.classList.contains('light');
  document.getElementById('theme-dark-btn').classList.toggle('active',!isLight);
  document.getElementById('theme-light-btn').classList.toggle('active',isLight);
  document.getElementById('font-size-val').textContent=FONT_SIZES[fontSizeIdx].label;
}

function setTheme(mode){
  const wantsLight=mode==='light';
  const isLight=document.documentElement.classList.contains('light');
  if(wantsLight!==isLight) toggleTheme();
  updateSettingsUI();
}

// Close settings on outside click
document.addEventListener('mousedown',e=>{
  const p=document.getElementById('settings-panel');
  const btn=document.getElementById('settings-btn');
  if(p.classList.contains('open') && !p.contains(e.target) && !btn.contains(e.target)){
    p.classList.remove('open');
    btn.classList.remove('active');
  }
});

function toggleHint(){
  document.getElementById('hint').classList.toggle('visible');
}

function toggleTheme(){

(function initTheme(){

// Restore font size
(function(){

  if(saved!==null) applyFontSize(parseInt(saved));
  else applyFontSize(2);
})();
updateSettingsUI();
// Multi-board init: loads the last active board
initBoards();
{
  const key='flowboard_state_'+state.boardId;
  const saved=localStorage.getItem(key);
  if(saved){
    try{
      const d=JSON.parse(saved);
      Object.assign(state,d);

    }catch(e){}

  }
}
updateTransform();
updateTitle();
state.groups.forEach(renderGroup);
state.nodes.forEach(renderCardOrImage);
state.texts.forEach(renderFreeText);
renderAllConnections();
renderAllArrows();
updateCounter();
renderSidebar();
renderBoardManager();

// Welcome cards if empty
if(!state.nodes.length&&!state.groups.length){

  createCard(cx-260,cy-100,{title:'Boardflowy へようこそ',body:'N: 新規カード\nG: グループ追加\nC: カード接続\nT: テキスト追加\n\\: ツールバー開閉\nCtrl+?: ショートカット一覧'});
  createCard(cx+80,cy-60,{title:'Workflowy 連携',body:'OPMLをCtrl+Vで貼付してインポート\nOPMLコピーで書き出し\nグループはネストとして出力される'});
